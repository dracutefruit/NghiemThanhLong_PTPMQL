<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Links</title>

    <style>
        a:link {
            color: green;
            background-color: transparent;
            text-decoration: none;
        }

        a:visited {
            color: pink;
            background-color: transparent;
            text-decoration: none;
        }

        a:hover {
            color: red;
            background-color: transparent;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
            background-color: transparent;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <a href="https://www.w3schools.com/">Nghiêm Thành Long</a><br>

    <a href="https://www.w3schools.com/" target="_blank">Nghiem Thanh Long</a><br>

    <a href="#C4">Thanh Long 2221050190</a>

    <h2 id="C4">Nghiêm Thành Long</h2>

    <a href="#top">Nghiem Thanh Long</a>

</body>

</html>
