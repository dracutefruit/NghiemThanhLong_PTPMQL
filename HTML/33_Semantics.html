<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Semantics</title>

    <style>
        header,
        nav,
        section,
        article,
        aside,
        footer {
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Nghiêm Thành Long</h1>
    </header>

    <nav>
        <a href="#">Nghiem</a> |
        <a href="#">Thanh</a> |
        <a href="#">Long</a>
    </nav>

    <section>
        <article>
            <h2>Nghiêm Thành Long</h2>
            <p>2221050190</p>
        </article>
    </section>

    <aside>
        <p>Nghiem Thanh Long</p>
    </aside>

    <footer>
        <p>Nghiêm Thành Long</p>
    </footer>

</body>

</html>
