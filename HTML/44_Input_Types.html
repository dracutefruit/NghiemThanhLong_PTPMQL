<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Input Types</title>
</head>

<body>

    <form>
        <input type="text" value="Nghiêm Thành Long">
    </form>

    <form>
        <input type="password" value="2221050190">
    </form>

    <form>
        <input type="submit" value="Submit">
    </form>

    <form>
        <input type="reset" value="Reset">
    </form>

    <form>
        <input type="radio" name="name" value="Nghiêm"> Nghiêm
        <input type="radio" name="name" value="Thành"> Thành
        <input type="radio" name="name" value="Long"> Long
    </form>

    <form>
        <input type="checkbox" value="Nghiêm"> Nghiêm
        <input type="checkbox" value="Thành"> Thành
        <input type="checkbox" value="Long"> Long
    </form>

    <form>
        <input type="button" value="Nghiêm Thành Long">
    </form>

    <form>
        <input type="color">
    </form>

    <form>
        <input type="date">
    </form>

    <form>
        <input type="datetime-local">
    </form>

    <form>
        <input type="email" value="nghiem@example.com">
    </form>

    <form>
        <input type="file">
    </form>

    <form>
        <input type="month">
    </form>

    <form>
        <input type="number" value="2221050190">
    </form>

    <form>
        <input type="range">
    </form>

    <form>
        <input type="search" value="Nghiem Thanh Long">
    </form>

    <form>
        <input type="tel" value="2221050190">
    </form>

    <form>
        <input type="time">
    </form>

    <form>
        <input type="url" value="https://www.w3schools.com">
    </form>

    <form>
        <input type="week">
    </form>

</body>

</html>
