<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Div</title>

    <style>
        .myDiv {
            border: 5px outset red;
            background-color: lightblue;
            text-align: center;
        }

        .container {
            width: 100%;
        }

        .left {
            float: left;
            width: 50%;
            background-color: #D6EEEE;
        }

        .right {
            float: left;
            width: 50%;
            background-color: #FFE4C4;
        }
    </style>
</head>

<body>

    <div>
        Nghiêm Thành Long
    </div>

    <div class="myDiv">
        Nghiem Thanh Long 2221050190
    </div>

    <div class="container">
        <div class="left">Nghiêm</div>
        <div class="right">Thành Long</div>
    </div>

</body>

</html>
