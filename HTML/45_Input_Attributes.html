<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Input Attributes</title>
</head>

<body>

    <form>
        <input type="text" value="Nghiêm Thành Long" readonly>
    </form>

    <form>
        <input type="text" value="Nghiem Thanh Long" disabled>
    </form>

    <form>
        <input type="text" value="Nghiêm Thành Long" size="40">
    </form>

    <form>
        <input type="text" value="Nghiêm Thành Long" maxlength="10">
    </form>

    <form>
        <input type="number" value="22" min="1" max="100">
    </form>

    <form>
        <input type="number" value="10" step="2">
    </form>

    <form>
        <input type="text" placeholder="Nghiêm Thành Long">
    </form>

    <form>
        <input type="text" required>
        <input type="submit">
    </form>

    <form>
        <input type="text" value="Nghiêm Thành Long" autofocus>
    </form>

    <form>
        <input type="text" value="Nghiem Thanh Long" autocomplete="on">
    </form>

    <form>
        <input type="file" multiple>
    </form>

    <form>
        <input type="text" pattern="[A-Za-z ]{3,}" value="Nghiem Thanh Long">
        <input type="submit">
    </form>

    <form>
        <input list="names">
        <datalist id="names">
            <option value="Nghiêm Thành Long">
            <option value="Nghiem Thanh Long">
            <option value="2221050190">
        </datalist>
    </form>

</body>

</html>
