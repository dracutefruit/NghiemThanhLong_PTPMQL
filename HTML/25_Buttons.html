<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Buttons</title>

    <style>
        button {
            background-color: #04AA6D;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <button>Nghiêm Thành Long</button>

    <button onclick="alert('Nghiem Thanh Long')">
        Nghiem Thanh Long
    </button>

    <button disabled>
        2221050190
    </button>

</body>

</html>
