<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Images</title>

    <style>
        body {
            background-image: url('https://www.w3schools.com/html/img_girl.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
    </style>
</head>

<body>

    <img src="https://www.w3schools.com/html/img_chania.jpg" alt="Nghiêm Thành Long">

    <img src="https://www.w3schools.com/html/pic_trulli.jpg" alt="Nghiem Thanh Long" width="460" height="345">

    <img src="https://www.w3schools.com/html/img_girl.jpg" alt="Thanh Long 2221050190"
        style="width:300px;height:400px;">

    <p>
        <img src="https://www.w3schools.com/images/w3schools_green.jpg" alt="Nghiêm Thành Long"
            style="float:left;width:42px;height:42px;">
        Nghiem Thanh Long
    </p>

    <img src="https://www.w3schools.com/html/workplace.jpg" alt="Nghiêm Thành Long" usemap="#workmap">

    <map name="workmap">
        <area shape="rect" coords="34,44,270,350" alt="Nghiêm Thành Long" href="https://www.w3schools.com">
        <area shape="rect" coords="290,172,333,250" alt="Nghiem Thanh Long" href="https://www.w3schools.com">
        <area shape="circle" coords="337,300,44" alt="Thanh Long 2221050190" href="https://www.w3schools.com">
    </map>

    <picture>
        <source media="(min-width: 650px)" srcset="https://www.w3schools.com/html/img_food.jpg">
        <source media="(min-width: 465px)" srcset="https://www.w3schools.com/html/img_car.jpg">
        <img src="https://www.w3schools.com/html/img_girl.jpg" alt="Nghiêm Thành Long">
    </picture>

</body>

</html>
